<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cubic bezier curve -->
  <path d="M10,100 C10,30 70,30 70,100 S130,170 130,100"
        fill="none" stroke="#E74C3C" stroke-width="2.5"/>
  <!-- Quadratic bezier -->
  <path d="M140,100 Q170,20 190,100 Q170,180 140,100 Z"
        fill="#3498DB" fill-opacity="0.4" stroke="#2980B9" stroke-width="2"/>
  <!-- Arc commands -->
  <path d="M30,160 A30,30 0 0,1 90,160 A30,15 0 0,0 30,160 Z"
        fill="#2ECC71" stroke="#27AE60" stroke-width="1.5"/>
  <!-- Complex mixed path: house shape -->
  <path d="M100,15 L130,45 L130,85 L110,85 L110,65 L90,65 L90,85 L70,85 L70,45 Z"
        fill="#F39C12" stroke="#E67E22" stroke-width="1.5"/>
  <!-- Smooth cubic + line segments -->
  <path d="M10,40 C30,10 50,10 60,40 S90,70 100,40 L100,50 C80,80 60,80 50,50 S20,70 10,40 Z"
        fill="#9B59B6" fill-opacity="0.5" stroke="#8E44AD" stroke-width="1.5"/>
  <!-- Small arcs and lines -->
  <path d="M140,140 l20,0 a10,10 0 0,1 10,10 l0,20 a10,10 0 0,1 -10,10
           l-20,0 a10,10 0 0,1 -10,-10 l0,-20 a10,10 0 0,1 10,-10 Z"
        fill="#1ABC9C" stroke="#16A085" stroke-width="2"/>
</svg>
